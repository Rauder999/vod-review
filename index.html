<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rewind — VOD Review</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:#09090b; --s1:#111113; --s2:#18181c; --s3:#222228;
  --b1:rgba(255,255,255,0.06); --b2:rgba(255,255,255,0.10); --b3:rgba(255,255,255,0.16);
  --tx:#f1f1f4; --t2:#9090a8; --t3:#55556a;
  --blue:#5b8ef0; --green:#4ecb8d; --red:#f06b5b; --yellow:#f0c55b; --purple:#9b6ef0;
  --r:8px; --r2:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* ── SETUP ── */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);z-index:200}
#setup::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 30% 20%,rgba(91,142,240,.08) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 70% 80%,rgba(78,203,141,.06) 0%,transparent 60%);pointer-events:none}
.setup-box{width:100%;max-width:460px;position:relative}
.setup-logo{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.setup-box h1{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:4px;line-height:1}
.setup-box h1 em{font-style:normal;color:var(--blue)}
.setup-tagline{color:var(--t2);font-size:14px;margin-bottom:36px;font-weight:300}
.pov-row{display:grid;grid-template-columns:10px 110px 1fr;gap:0 10px;align-items:center;margin-bottom:10px}
.pov-line{width:2px;height:40px;border-radius:2px;align-self:center}
.pov-name-wrap{position:relative}
.field{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .15s,background .15s}
.field:focus{border-color:var(--b3);background:var(--s3)}
.field::placeholder{color:var(--t3)}
.opt-tag{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;pointer-events:none}
.btn-start{width:100%;margin-top:20px;padding:14px;background:var(--blue);color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s,transform .1s}
.btn-start:hover{opacity:.88}
.btn-start:active{transform:scale(.99)}
.setup-err{color:var(--red);font-size:12px;margin-top:8px;text-align:center;font-family:'JetBrains Mono',monospace;display:none}

/* ── APP ── */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}

.topbar{height:42px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--b1);background:var(--s1)}
.t-logo{font-size:14px;font-weight:700;letter-spacing:-.3px}
.t-logo span{color:var(--blue)}
.t-div{width:1px;height:14px;background:var(--b2)}
.t-sess{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px}
.t-right{margin-left:auto;display:flex;gap:5px;align-items:center}
.btn-ghost{background:transparent;border:1px solid var(--b1);color:var(--t2);padding:4px 11px;border-radius:var(--r2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-ghost:hover{color:var(--tx);border-color:var(--b2)}
.notes-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:none;margin-right:2px}

.layout{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── LEFT ── */
.left-col{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--b1)}
.stage{flex:1;background:#000;position:relative;min-height:0}
#main-yt{width:100%;height:100%}
#main-yt iframe{width:100%;height:100%;display:block}
.stage-badge{position:absolute;top:14px;left:14px;display:flex;align-items:center;gap:8px;background:rgba(9,9,11,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:5px 12px 5px 8px;pointer-events:none}
.badge-dot{width:7px;height:7px;border-radius:50%}
.badge-name{font-size:12px;font-weight:500}
.loop-badge{position:absolute;top:14px;right:14px;background:rgba(240,197,91,.15);border:1px solid rgba(240,197,91,.3);color:var(--yellow);border-radius:5px;padding:4px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;display:none}

/* ── CONTROLS ── */
.controls{background:var(--s1);border-top:1px solid var(--b1);padding:10px 14px 12px;flex-shrink:0}

.tl-labels{display:flex;justify-content:space-between;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-bottom:4px}
.tl-track{position:relative;height:28px;cursor:pointer;display:flex;align-items:center}
.tl-bg{position:absolute;inset:11px 0;background:var(--s3);border-radius:4px;overflow:hidden;transition:inset .1s}
.tl-track:hover .tl-bg{inset:9px 0}
.tl-fill{height:100%;background:linear-gradient(90deg,var(--blue) 0%,rgba(91,142,240,.6) 100%);width:0%;border-radius:4px}
.tl-loop-region{position:absolute;top:0;height:100%;background:rgba(240,197,91,.18);pointer-events:none;display:none}
.tl-markers{position:absolute;inset:0;pointer-events:none}
.tl-marker{position:absolute;top:0;bottom:0;width:2px;transform:translateX(-50%);cursor:pointer;pointer-events:all}
.tl-marker-line{position:absolute;inset:6px 0;border-radius:2px}
.tl-marker-dot{position:absolute;top:3px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;border:1.5px solid var(--bg)}
.tl-playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;transform:translateX(-50%);pointer-events:none}
.tl-playhead::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:7px;height:7px;background:#fff;border-radius:50%}

.ctrl-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.transport{display:flex;gap:3px;align-items:center}
.tbtn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);width:34px;height:32px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;flex-shrink:0}
.tbtn svg{width:13px;height:13px;fill:currentColor;pointer-events:none}
.tbtn:hover{color:var(--tx);background:var(--s3);border-color:var(--b2)}
.tbtn.play-btn{width:40px;background:var(--blue);border-color:var(--blue);color:#fff}
.tbtn.play-btn:hover{background:#6e9df5}
.tbtn.active-loop{background:rgba(240,197,91,.12);color:var(--yellow);border-color:rgba(240,197,91,.3)}
.speed-pill{display:flex;align-items:center;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);height:32px;overflow:hidden}
.speed-adj{background:none;border:none;color:var(--t2);width:24px;height:100%;cursor:pointer;font-size:14px;transition:all .1s;display:flex;align-items:center;justify-content:center}
.speed-adj:hover{color:var(--tx);background:var(--b1)}
.speed-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx);min-width:28px;text-align:center}
.pov-tabs{margin-left:auto;display:flex;gap:3px}
.ptab{padding:5px 12px;border-radius:var(--r2);border:1px solid var(--b1);background:transparent;color:var(--t2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.ptab:hover{color:var(--tx);border-color:var(--b2)}
.ptab.active{color:#fff;background:rgba(255,255,255,.03)}
.tag-row{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tag-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:'Outfit',sans-serif}
.tag-pill:hover{opacity:.8;transform:translateY(-1px)}

/* ── RIGHT SIDEBAR ── */
.right-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--s1);overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1),opacity .3s}
.right-col.collapsed{width:0;opacity:0;pointer-events:none}
.sb{padding:12px 14px;border-bottom:1px solid var(--b1)}
.sb-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sb-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sb-action{background:none;border:none;color:var(--t3);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:color .1s}
.sb-action:hover{color:var(--t2)}

.mini-card{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.mini-card:last-child{margin-bottom:0}
.mini-card:hover{border-color:var(--b2)}
.mini-head{display:flex;align-items:center;padding:6px 8px;gap:7px;background:rgba(255,255,255,.015)}
.mini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mini-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2)}
.mini-video{width:100%;aspect-ratio:16/9;background:#000;pointer-events:none}
.mini-video iframe{width:100%;height:100%;display:block}

.sync-row-item{display:flex;align-items:center;gap:7px;padding:7px 8px;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r2);margin-bottom:5px;transition:border-color .15s}
.sync-row-item:last-child{margin-bottom:0}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-name{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-ts{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);min-width:32px;text-align:right}
.sync-ts.set{color:var(--tx)}
.btn-flag{background:var(--s3);border:1px solid var(--b1);color:var(--t3);width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .12s;flex-shrink:0}
.btn-flag:hover{border-color:var(--b2);color:var(--tx)}
.btn-flag.flagged{background:rgba(78,203,141,.12);border-color:rgba(78,203,141,.35);color:var(--green)}
.btn-apply{width:100%;margin-top:8px;padding:7px;background:rgba(78,203,141,.1);border:1px solid rgba(78,203,141,.25);color:var(--green);border-radius:var(--r2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:none;transition:all .15s}
.btn-apply:hover{background:rgba(78,203,141,.18)}

.marker-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--r2);cursor:pointer;transition:background .1s;font-size:12px}
.marker-item:hover{background:var(--b1)}
.mi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mi-ts{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);min-width:32px}
.mi-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mi-pov{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.mi-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:0 2px;opacity:0;transition:opacity .1s,color .1s}
.marker-item:hover .mi-del{opacity:1}
.mi-del:hover{color:var(--red)}
.empty-hint{font-size:11px;color:var(--t3);text-align:center;padding:12px 0;font-family:'JetBrains Mono',monospace}

.hkbar{padding:8px 14px;border-top:1px solid var(--b1);display:flex;gap:10px;flex-wrap:wrap}
.hk{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3)}
kbd{background:var(--s3);border:1px solid var(--b1);border-radius:3px;padding:1px 4px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2)}

/* ── NOTES PANEL ── */
.notes-panel{position:fixed;right:0;top:42px;bottom:0;width:296px;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-12px 0 40px rgba(0,0,0,.4)}
.notes-panel.open{transform:translateX(0)}
.np-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--b1)}
.np-title{font-size:13px;font-weight:600}
.btn-xnotes{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;line-height:1;transition:color .1s;padding:0 2px}
.btn-xnotes:hover{color:var(--tx)}
.np-body{flex:1;display:flex;flex-direction:column;padding:12px 14px;gap:8px;min-height:0}
textarea{flex:1;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r2);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;padding:10px;resize:none;outline:none;transition:border-color .15s;min-height:0}
textarea:focus{border-color:var(--b2)}
textarea::placeholder{color:var(--t3)}
.btn-ts{background:var(--s3);border:1px solid var(--b1);color:var(--t2);border-radius:var(--r2);padding:7px 12px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.btn-ts:hover{color:var(--tx);border-color:var(--b2)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(48px);background:var(--s2);border:1px solid var(--b2);color:var(--tx);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;transition:transform .22s cubic-bezier(.34,1.3,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">Rewind</div>
    <h1>VOD <em>Review</em></h1>
    <p class="setup-tagline">Multi-POV sync analysis for competitive teams.</p>
    <div class="pov-row">
      <div class="pov-line" style="background:#5b8ef0"></div>
      <input class="field" id="n1" type="text" placeholder="Player 1">
      <input class="field" id="u1" type="text" placeholder="YouTube URL">
    </div>
    <div class="pov-row">
      <div class="pov-line" style="background:#4ecb8d"></div>
      <input class="field" id="n2" type="text" placeholder="Player 2">
      <input class="field" id="u2" type="text" placeholder="YouTube URL">
    </div>
    <div class="pov-row">
      <div class="pov-line" style="background:#f06b5b"></div>
      <div class="pov-name-wrap">
        <input class="field" id="n3" type="text" placeholder="Player 3">
        <span class="opt-tag">opt</span>
      </div>
      <input class="field" id="u3" type="text" placeholder="YouTube URL">
    </div>
    <div class="setup-err" id="serr">Need at least 2 valid YouTube URLs</div>
    <button class="btn-start" onclick="startSession()">Start Session →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="t-logo">Re<span>wind</span></span>
    <div class="t-div"></div>
    <span class="t-sess" id="tsess"></span>
    <div class="t-right">
      <button class="btn-ghost" id="btn-notes" onclick="toggleNotes()" style="display:flex;align-items:center;gap:4px">
        <div class="notes-dot" id="ndot"></div>Notes
      </button>
      <button class="btn-ghost" onclick="exportHTML()">Export</button>
      <button class="btn-ghost" onclick="newSession()">New</button>
    </div>
  </div>

  <div class="layout">
    <div class="left-col">
      <div class="stage">
        <div id="main-yt"></div>
        <div class="stage-badge">
          <div class="badge-dot" id="bdot"></div>
          <span class="badge-name" id="bname"></span>
        </div>
        <div class="loop-badge" id="loop-badge">⟳ LOOP</div>
      </div>

      <div class="controls">
        <div class="tl-labels">
          <span id="tlbl-c">0:00</span>
          <span id="tlbl-d">0:00</span>
        </div>
        <div class="tl-track" id="tl" onclick="seekClick(event)">
          <div class="tl-bg">
            <div class="tl-fill" id="tl-fill"></div>
            <div class="tl-loop-region" id="tl-loop"></div>
          </div>
          <div class="tl-markers" id="tl-marks"></div>
          <div class="tl-playhead" id="tl-head" style="left:0%"></div>
        </div>

        <div class="ctrl-row">
          <div class="transport">
            <button class="tbtn" onclick="seekRel(-10)" title="-10s">
              <svg viewBox="0 0 16 16"><path d="M2 8a6 6 0 1 0 .8-3l1.5 1.5A4 4 0 1 1 3.6 9H2z"/><text x="5" y="13" style="font-size:4.5px;fill:currentColor;font-family:sans-serif">10</text></svg>
            </button>
            <button class="tbtn" onclick="frameStep(-1)" title="Frame back (,)">
              <svg viewBox="0 0 16 16"><path d="M10 3v10L5 8l5-5zm-6 0v10H2V3h2z"/></svg>
            </button>
            <button class="tbtn play-btn" id="pbtn" onclick="togglePlay()">
              <svg id="play-ico" viewBox="0 0 16 16"><path d="M4 3l9 5-9 5V3z"/></svg>
            </button>
            <button class="tbtn" onclick="frameStep(1)" title="Frame forward (.)">
              <svg viewBox="0 0 16 16"><path d="M6 3v10l5-5-5-5zm4 0v10h2V3h-2z"/></svg>
            </button>
            <button class="tbtn" onclick="seekRel(10)" title="+10s">
              <svg viewBox="0 0 16 16"><path d="M14 8a6 6 0 1 1-.8-3l-1.5 1.5A4 4 0 1 0 12.4 9H14z"/><text x="5" y="13" style="font-size:4.5px;fill:currentColor;font-family:sans-serif">10</text></svg>
            </button>
            <button class="tbtn" id="loop-btn" onclick="toggleLoop()" title="Loop (L)">
              <svg viewBox="0 0 16 16"><path d="M2 8a5 5 0 1 0 1.2-3.2L2 3.5V7h3.5L4.2 5.7A3.5 3.5 0 1 1 3.5 8H2z"/></svg>
            </button>
          </div>
          <div class="speed-pill">
            <button class="speed-adj" onclick="chSpd(-.25)">−</button>
            <span class="speed-val" id="slbl">1×</span>
            <button class="speed-adj" onclick="chSpd(.25)">+</button>
          </div>
          <div class="pov-tabs" id="povtabs"></div>
        </div>

        <div class="tag-row" id="tag-row"></div>
      </div>
    </div>

    <div class="right-col" id="rcol">
      <div class="sb">
        <div class="sb-title">All POVs</div>
        <div id="minilist"></div>
      </div>
      <div class="sb">
        <div class="sb-hd">
          <div class="sb-title">Sync Points</div>
          <button class="sb-action" onclick="clearSync()">Clear</button>
        </div>
        <div id="synclist"></div>
        <button class="btn-apply" id="bapply" onclick="applySync()">Apply Sync →</button>
      </div>
      <div class="sb" style="flex:1;overflow-y:auto;border-bottom:none">
        <div class="sb-hd">
          <div class="sb-title">Markers</div>
          <button class="sb-action" onclick="clearMarkers()">Clear all</button>
        </div>
        <div id="mklist"><div class="empty-hint">No markers yet</div></div>
      </div>
      <div class="hkbar">
        <div class="hk"><kbd>Space</kbd>play</div>
        <div class="hk"><kbd>1-3</kbd>POV</div>
        <div class="hk"><kbd>←→</kbd>5s</div>
        <div class="hk"><kbd>.,</kbd>frame</div>
        <div class="hk"><kbd>F</kbd>sync</div>
        <div class="hk"><kbd>L</kbd>loop</div>
        <div class="hk"><kbd>T</kbd>ts</div>
        <div class="hk"><kbd>N</kbd>notes</div>
      </div>
    </div>
  </div>

  <div class="notes-panel" id="np">
    <div class="np-hd">
      <span class="np-title">Session Notes</span>
      <button class="btn-xnotes" onclick="toggleNotes()">×</button>
    </div>
    <div class="np-body">
      <textarea id="notes" placeholder="Write your analysis here...&#10;&#10;Press T or click a tag below the timeline to insert a timestamped marker."></textarea>
      <button class="btn-ts" onclick="insertTs()">+ Insert Timestamp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CHEX=['#5b8ef0','#4ecb8d','#f06b5b'];
const TAGS=[
  {id:'mistake',label:'Mistake',c:'#f06b5b'},
  {id:'good',label:'Good Play',c:'#4ecb8d'},
  {id:'rotation',label:'Rotation',c:'#5b8ef0'},
  {id:'comms',label:'Comms',c:'#f0c55b'},
  {id:'note',label:'Note',c:'#9b6ef0'},
];

const S={
  povs:[],active:0,playing:false,speed:1,dur:0,
  main:null,minis:[],ready:[],ticker:null,
  markers:[],loopMode:false,loopA:null,loopB:null,notesOpen:false
};
let mid=0;

let ytOk=false;
window.onYouTubeIframeAPIReady=()=>{ytOk=true};
const sc=document.createElement('script');sc.src='https://www.youtube.com/iframe_api';document.head.appendChild(sc);
function waitYT(cb){if(ytOk&&window.YT?.Player)cb();else setTimeout(()=>waitYT(cb),100)}
function getVid(u){if(!u)return null;const m=u.match(/(?:v=|\/embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:(/^[a-zA-Z0-9_-]{11}$/.test(u)?u:null)}

function startSession(){
  const rows=[
    {name:document.getElementById('n1').value.trim()||'Player 1',url:document.getElementById('u1').value.trim()},
    {name:document.getElementById('n2').value.trim()||'Player 2',url:document.getElementById('u2').value.trim()},
    {name:document.getElementById('n3').value.trim()||'Player 3',url:document.getElementById('u3').value.trim()},
  ];
  const valid=rows.filter(r=>getVid(r.url));
  if(valid.length<2){document.getElementById('serr').style.display='block';return}
  S.povs=valid.map((r,i)=>({name:r.name,vid:getVid(r.url),hex:CHEX[i],offset:0,syncPt:null}));
  S.active=0;S.ready=new Array(S.povs.length).fill(false);S.minis=new Array(S.povs.length).fill(null);
  S.markers=[];S.loopMode=false;S.loopA=null;S.loopB=null;S.notesOpen=false;
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  buildUI();waitYT(initPlayers);
}

function buildUI(){
  document.getElementById('tsess').textContent=S.povs.map(p=>p.name).join(' · ');
  document.getElementById('main-yt').innerHTML='<div id="yt-main"></div>';
  updateBadge();
  document.getElementById('povtabs').innerHTML=S.povs.map((p,i)=>`<button class="ptab ${i===0?'active':''}" id="pt-${i}" style="${i===0?`border-color:${p.hex};color:${p.hex}`:''}" onclick="switchPov(${i})">${p.name}</button>`).join('');
  document.getElementById('minilist').innerHTML=S.povs.map((p,i)=>`
    <div class="mini-card" id="mc-${i}" style="${i===0?`border-color:${p.hex}`:''}" onclick="switchPov(${i})">
      <div class="mini-head"><div class="mini-dot" style="background:${p.hex}"></div><span class="mini-name">${p.name}</span><span class="mini-time" id="mt-${i}">0:00</span></div>
      <div class="mini-video"><div id="yt-mini-${i}"></div></div>
    </div>`).join('');
  document.getElementById('tag-row').innerHTML=TAGS.map(t=>`<button class="tag-pill" style="background:${t.c}18;color:${t.c};border-color:${t.c}30" onclick="addMarker('${t.id}')">${t.label}</button>`).join('');
  buildSyncUI();renderMarkers();
}

function buildSyncUI(){
  document.getElementById('synclist').innerHTML=S.povs.map((p,i)=>`
    <div class="sync-row-item" id="sr-${i}" style="${p.syncPt!==null?`border-color:${p.hex}`:''}">
      <div class="sync-dot" style="background:${p.hex}"></div>
      <span class="sync-name">${p.name}</span>
      <span class="sync-ts ${p.syncPt!==null?'set':''}" id="sp-${i}">${p.syncPt!==null?fmt(p.syncPt):'—'}</span>
      <button class="btn-flag ${p.syncPt!==null?'flagged':''}" onclick="flagSync(${i})">⚑</button>
    </div>`).join('');
  document.getElementById('bapply').style.display=S.povs.every(p=>p.syncPt!==null)?'block':'none';
}

function updateBadge(){const p=S.povs[S.active];document.getElementById('bdot').style.background=p.hex;document.getElementById('bname').textContent=p.name}

function initPlayers(){
  S.main=new YT.Player('yt-main',{videoId:S.povs[0].vid,playerVars:{controls:0,disablekb:1,rel:0,modestbranding:1},events:{
    onReady:e=>{S.main=e.target;markReady(0)},
    onStateChange:e=>{
      if(e.data===YT.PlayerState.PLAYING){S.playing=true;setPlay(true)}
      if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.ENDED){S.playing=false;setPlay(false)}
    }
  }});
  S.povs.forEach((p,i)=>{
    new YT.Player(`yt-mini-${i}`,{videoId:p.vid,playerVars:{controls:0,disablekb:1,rel:0,modestbranding:1,mute:1},events:{
      onReady:e=>{S.minis[i]=e.target;e.target.mute();if(i!==0)markReady(i)}
    }});
  });
}

function markReady(i){S.ready[i]=true;if(S.ready.every(Boolean)){clearInterval(S.ticker);S.ticker=setInterval(tick,250)}}

function tick(){
  if(!S.main)return;
  try{
    const t=S.main.getCurrentTime()||0,dur=S.main.getDuration()||0;
    S.dur=dur;
    const pct=dur>0?(t/dur*100):0;
    document.getElementById('tl-fill').style.width=pct+'%';
    document.getElementById('tl-head').style.left=pct+'%';
    document.getElementById('tlbl-c').textContent=fmt(t);
    document.getElementById('tlbl-d').textContent=fmt(dur);
    if(S.loopMode&&S.loopA!==null&&S.loopB!==null&&t>=S.loopB)S.main.seekTo(S.loopA,true);
    S.minis.forEach((m,i)=>{
      if(!m)return;
      try{
        const el=document.getElementById(`mt-${i}`);
        if(el)el.textContent=fmt(Math.max(0,t+S.povs[i].offset));
        const exp=t+S.povs[i].offset;
        const mt=m.getCurrentTime()||0;
        if(Math.abs(mt-exp)>2){m.seekTo(Math.max(0,exp),true);}
        const st=m.getPlayerState();
        if(S.playing&&st!==1&&st!==3){m.playVideo();}
        else if(!S.playing&&st===1){m.pauseVideo();}
      }catch(e){}
    });
    renderTimelineMarkers();
  }catch(e){}
}

function togglePlay(){if(!S.main)return;if(S.playing){S.main.pauseVideo();S.minis.forEach(m=>{try{m.pauseVideo()}catch(e){}});}else{S.main.playVideo();S.minis.forEach(m=>{try{m.playVideo()}catch(e){}});}}
function setPlay(pl){const ico=document.getElementById('play-ico');ico.innerHTML=pl?'<rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/>':'<path d="M4 3l9 5-9 5V3z"/>';}
function seekRel(s){if(!S.main)return;const t=Math.max(0,(S.main.getCurrentTime()||0)+s);S.main.seekTo(t,true);S.minis.forEach((m,i)=>{try{m.seekTo(Math.max(0,t+S.povs[i].offset),true)}catch(e){}});}
function frameStep(d){if(!S.main)return;S.main.pauseVideo();S.minis.forEach(m=>{try{m.pauseVideo()}catch(e){}});const t=Math.max(0,(S.main.getCurrentTime()||0)+d*(1/30));S.main.seekTo(t,true);S.minis.forEach((m,i)=>{try{m.seekTo(Math.max(0,t+S.povs[i].offset),true)}catch(e){}});}
function chSpd(d){S.speed=Math.max(.25,Math.min(2,Math.round((S.speed+d)*4)/4));try{S.main.setPlaybackRate(S.speed)}catch(e){}document.getElementById('slbl').textContent=S.speed+'×';}

function seekClick(e){
  if(!S.main||!S.dur)return;
  const r=e.currentTarget.getBoundingClientRect(),pct=(e.clientX-r.left)/r.width,t=pct*S.dur;
  if(S.loopMode){
    if(S.loopA===null){S.loopA=t;toast('Loop start — click end point');updateLoopViz();return}
    if(S.loopB===null){S.loopB=Math.max(S.loopA+1,t);toast('Loop active ⟳');updateLoopViz();S.main.seekTo(S.loopA,true);S.main.playVideo();return}
  }
  S.main.seekTo(t,true);S.minis.forEach((m,i)=>{try{m.seekTo(Math.max(0,t+S.povs[i].offset),true)}catch(e){}});
}

function toggleLoop(){
  S.loopMode=!S.loopMode;S.loopA=null;S.loopB=null;
  document.getElementById('loop-btn').classList.toggle('active-loop',S.loopMode);
  document.getElementById('loop-badge').style.display=S.loopMode?'block':'none';
  document.getElementById('tl-loop').style.display='none';
  toast(S.loopMode?'Loop mode — click start on timeline':'Loop off');
}

function updateLoopViz(){
  if(!S.dur||S.loopA===null||S.loopB===null)return;
  const tl=document.getElementById('tl-loop');tl.style.display='block';
  tl.style.left=(S.loopA/S.dur*100)+'%';tl.style.width=((S.loopB-S.loopA)/S.dur*100)+'%';
}

function switchPov(idx){
  if(idx>=S.povs.length)return;
  const t=S.main?(S.main.getCurrentTime()||0):0,newT=Math.max(0,t+S.povs[idx].offset),wasP=S.playing;
  try{S.main.loadVideoById({videoId:S.povs[idx].vid,startSeconds:newT});S.main.setPlaybackRate(S.speed);if(!wasP)setTimeout(()=>{try{S.main.pauseVideo()}catch(e){}},800);}catch(e){}
  S.active=idx;updateBadge();
  S.povs.forEach((p,i)=>{
    const tab=document.getElementById(`pt-${i}`);if(tab){tab.classList.toggle('active',i===idx);tab.style.borderColor=i===idx?p.hex:'var(--b1)';tab.style.color=i===idx?p.hex:'var(--t2)';}
    const mc=document.getElementById(`mc-${i}`);if(mc)mc.style.borderColor=i===idx?p.hex:'var(--b1)';
  });
}

function flagSync(idx){
  if(!S.main)return;
  let t=idx===S.active?(S.main.getCurrentTime()||0):0;
  if(idx!==S.active)try{t=S.minis[idx].getCurrentTime()||0}catch(e){}
  S.povs[idx].syncPt=t;buildSyncUI();
  toast(`${S.povs[idx].name} sync @ ${fmt(t)}`);
  if(S.povs.every(p=>p.syncPt!==null))toast('All set — Apply Sync!');
}

function applySync(){
  const min=Math.min(...S.povs.map(p=>p.syncPt));
  S.povs.forEach(p=>p.offset=-(p.syncPt-min));
  // Seek each player to their sync point timestamp
  if(S.main)try{S.main.seekTo(S.povs[S.active].syncPt,true)}catch(e){}
  S.minis.forEach((m,i)=>{try{m.seekTo(S.povs[i].syncPt,true)}catch(e){}});
  buildSyncUI();toast('Synced ✓ — press Play');
}

function clearSync(){S.povs.forEach(p=>{p.syncPt=null;p.offset=0;});buildSyncUI();}

function addMarker(tagId){
  if(!S.main)return;
  const t=S.main.getCurrentTime()||0,tag=TAGS.find(x=>x.id===tagId);
  S.markers.push({id:++mid,ts:t,tag:tagId,pov:S.active,label:tag.label,c:tag.c});
  S.markers.sort((a,b)=>a.ts-b.ts);
  renderMarkers();
  toast(`${tag.label} @ ${fmt(t)}`);
  if(!S.notesOpen)toggleNotes();
  const ta=document.getElementById('notes');
  const line=`[${fmt(t)} · ${S.povs[S.active].name} · ${tag.label}] `;
  const pos=ta.selectionStart;ta.value=ta.value.slice(0,pos)+line+ta.value.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+line.length;ta.focus();updateNotesDot();
}

function renderMarkers(){
  const el=document.getElementById('mklist');
  if(!S.markers.length){el.innerHTML='<div class="empty-hint">No markers yet</div>';return}
  el.innerHTML=S.markers.map(m=>`
    <div class="marker-item" onclick="jumpMk(${m.id})">
      <div class="mi-dot" style="background:${m.c}"></div>
      <span class="mi-ts">${fmt(m.ts)}</span>
      <span class="mi-label" style="color:${m.c}">${m.label}</span>
      <span class="mi-pov">${S.povs[m.pov]?.name||''}</span>
      <button class="mi-del" onclick="delMk(event,${m.id})">×</button>
    </div>`).join('');
}

function renderTimelineMarkers(){
  if(!S.dur)return;
  const el=document.getElementById('tl-marks');
  el.innerHTML=S.markers.map(m=>{const pct=m.ts/S.dur*100;return`
    <div class="tl-marker" style="left:${pct}%" onclick="jumpMk(${m.id})" title="${m.label} ${fmt(m.ts)}">
      <div class="tl-marker-line" style="background:${m.c}"></div>
      <div class="tl-marker-dot" style="background:${m.c}"></div>
    </div>`}).join('');
}

function jumpMk(id){
  const m=S.markers.find(x=>x.id===id);if(!m||!S.main)return;
  if(m.pov!==S.active)switchPov(m.pov);
  setTimeout(()=>{try{S.main.seekTo(m.ts,true)}catch(e){}S.minis.forEach((mp,i)=>{try{mp.seekTo(Math.max(0,m.ts+S.povs[i].offset),true)}catch(e){}});},m.pov!==S.active?900:0);
}

function delMk(e,id){e.stopPropagation();S.markers=S.markers.filter(m=>m.id!==id);renderMarkers();}
function clearMarkers(){S.markers=[];renderMarkers();document.getElementById('tl-marks').innerHTML='';}

function toggleNotes(){
  S.notesOpen=!S.notesOpen;
  document.getElementById('np').classList.toggle('open',S.notesOpen);
}

function insertTs(){
  const t=S.main?(S.main.getCurrentTime()||0):0;
  const ta=document.getElementById('notes');
  const ts=`[${fmt(t)} · ${S.povs[S.active].name}] `;
  const pos=ta.selectionStart;ta.value=ta.value.slice(0,pos)+ts+ta.value.slice(pos);
  ta.selectionStart=ta.selectionEnd=pos+ts.length;ta.focus();
  updateNotesDot();if(!S.notesOpen)toggleNotes();
}

function updateNotesDot(){document.getElementById('ndot').style.display=document.getElementById('notes').value.trim().length>0?'block':'none';}

function exportHTML(){
  const notes=document.getElementById('notes').value;
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const mkRows=S.markers.map(m=>`<tr><td style="color:${m.c};font-family:monospace">${fmt(m.ts)}</td><td><span style="background:${m.c}22;color:${m.c};padding:2px 8px;border-radius:10px;font-size:11px">${m.label}</span></td><td>${S.povs[m.pov]?.name||''}</td></tr>`).join('');
  const notesHtml=notes.replace(/\[([^\]]+)\]/g,'<span style="color:#5b8ef0;font-weight:600">[$1]</span>').replace(/\n/g,'<br>');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Rewind Report</title>
<style>body{font-family:system-ui,sans-serif;background:#0f0f12;color:#e8e8f0;max-width:760px;margin:0 auto;padding:40px 24px}h1{font-size:28px;font-weight:700;margin-bottom:4px}h1 span{color:#5b8ef0}.meta{color:#666;font-size:13px;margin-bottom:32px}.sec{background:#18181c;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:20px;margin-bottom:16px}.sec h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:14px;font-family:monospace}.pr{display:flex;align-items:center;gap:10px;margin-bottom:8px}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.pn{font-weight:600}.pu{color:#5b8ef0;font-size:12px;font-family:monospace}.po{color:#666;font-size:12px;font-family:monospace;margin-left:auto}table{width:100%;border-collapse:collapse}td,th{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;text-align:left}th{color:#555;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}.nc{font-family:monospace;font-size:12px;line-height:1.8;color:#c0c0d0}</style>
</head><body>
<h1>Re<span>wind</span> — VOD Review</h1>
<div class="meta">${date} · ${S.povs.map(p=>p.name).join(', ')}</div>
<div class="sec"><h2>Players</h2>${S.povs.map(p=>`<div class="pr"><div class="dot" style="background:${p.hex}"></div><span class="pn">${p.name}</span><a class="pu" href="https://youtu.be/${p.vid}" target="_blank">youtu.be/${p.vid}</a><span class="po">offset ${p.offset.toFixed(1)}s</span></div>`).join('')}</div>
${S.markers.length?`<div class="sec"><h2>Markers (${S.markers.length})</h2><table><tr><th>Time</th><th>Tag</th><th>POV</th></tr>${mkRows}</table></div>`:''}
${notes.trim()?`<div class="sec"><h2>Notes</h2><div class="nc">${notesHtml}</div></div>`:''}
</body></html>`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download=`vod-review-${S.povs[0].name.toLowerCase().replace(/\s/g,'-')}.html`;a.click();toast('Report exported ✓');
}

function newSession(){
  clearInterval(S.ticker);[S.main,...S.minis].forEach(p=>{try{p.destroy()}catch(e){}});S.main=null;S.minis=[];
  S.notesOpen=false;document.getElementById('np').classList.remove('open');
  document.getElementById('app').style.display='none';document.getElementById('setup').style.display='flex';
}

function fmt(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400);}

document.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display==='none')return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  switch(e.key){
    case' ':e.preventDefault();togglePlay();break;
    case'ArrowLeft':seekRel(-5);break;case'ArrowRight':seekRel(5);break;
    case'1':switchPov(0);break;case'2':switchPov(1);break;case'3':switchPov(2);break;
    case',':frameStep(-1);break;case'.':frameStep(1);break;
    case'f':case'F':flagSync(S.active);break;
    case'l':case'L':toggleLoop();break;
    case't':case'T':insertTs();break;
    case'n':case'N':toggleNotes();break;
  }
});
</script>
</body>
</html>
